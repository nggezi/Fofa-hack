name: Publish

on:
  workflow_dispatch:        # 手动触发
  push:                     # 打 tag 自动触发
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.8"

    - name: Install cibuildwheel
      run: python -m pip install --upgrade pip cibuildwheel setuptools wheel

    - name: Build wheels and sdist
      run: |
        # 清理旧文件
        rm -rf wheelhouse dist
        mkdir wheelhouse
        # 构建 wheel（多架构）和源码包
        cibuildwheel --output-dir wheelhouse
        python setup.py sdist --dist-dir wheelhouse
      env:
        CIBW_ARCHS_LINUX: "x86_64 aarch64"      # 构建 amd64 和 arm64
        CIBW_SKIP: "pp*"                        # 可选，跳过 PyPy
        CIBW_BUILD: "cp38-* cp39-* cp310-* cp311-*"

    - name: Upload wheels as artifacts
      uses: actions/upload-artifact@v4
      with:
        name: python-wheels
        path: wheelhouse/*

    - name: Publish to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1
      with:
        user: __token__
        password: ${{ secrets.PYPI_API_TOKEN }}
        skip_existing: true
        packages_dir: wheelhouse/

    - name: Create GitHub Release and upload wheels + sdist
      uses: softprops/action-gh-release@v1
      with:
        files: wheelhouse/*
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
